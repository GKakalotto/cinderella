<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Cinderella</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #fff;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
        }

        .icon {
            width: 56px;
            height: 56px;
            margin-bottom: 16px;
        }

        .title {
            margin-bottom: 12px;
            font-size: 20px;
            font-weight: 600;
            color: #303133;
        }

        .message {
            font-size: 15px;
            line-height: 1.6;
            color: #606266;
        }
    </style>
</head>

<body>
    <img class="icon" src="image/app.png" alt="">
    <div class="title" id="title"></div>
    <div class="message" id="message"></div>
    <script src="notification.js"></script>
</body>

</html>
